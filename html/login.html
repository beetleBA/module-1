<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root {
        --wdth: min(90vw, 800px);
      }
      .slider {
        max-width: var(--wdth);
        overflow: hidden;
        margin: auto;
      }
      .slides {
        display: flex;
        gap: 10px;
        width: 300%;
        transition: 0.8s;
      }
      .slide {
        width: 100%;
        position: relative;
      }
      /* input {
        display: none;
      } */
      .slide img {
        width: 100%;
        height: 400px;
        object-fit: cover;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .nav label {
        width: 10px;
        height: 10px;
        background-color: gray;
        border-radius: 50%;
      }
      .text {
        position: absolute;
        bottom: 0;
        margin: 1rem;
        backdrop-filter: blur(10px);
      }
      #s1:checked ~ .slides {
        transform: translateX(0);
      }
      #s2:checked ~ .slides {
        transform: translateX(calc(var(--wdth) * -1));
      }

      #s1:checked ~ .nav label[for="s1"] {
        background: red;
      }
    </style>
  </head>
  <body>
    <section id="slider">
      <div class="slider">
        <input type="radio" name="sld" id="s1" checked />
        <input type="radio" name="sld" id="s2" />
        <input type="radio" name="sld" id="s3" />
        <div class="slides">
          <div class="slide">
            <img src="../img/i.webp" alt="" />
            <div class="text">text</div>
          </div>
          <div class="slide">
            <img src="../img/i.webp" alt="" />
            <div class="text">text 1</div>
          </div>
          <div class="slide">
            <img src="../img/i.webp" alt="" />
            <div class="text">text</div>
          </div>
        </div>
        <div class="nav">
          <label for="s1"></label>
          <label for="s2"></label>
          <label for="s3"></label>
        </div>
      </div>
    </section>
  </body>
</html>
