<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div id="logo" class="logo"><img src="../img/logo.png" alt="" /></div>
        <div id="main-nav">
          <input type="checkbox" name="burger" id="burger" />
          <label for="burger" class="burger-icon">
            <span></span>
            <span></span>
            <span></span>
          </label>
          <nav>
            <ul>
              <li id="go-to-serach">
                <a href="">Поиск</a>
              </li>
              <li id="nav-catalog">
                <a href="">Каталог</a>
              </li>
              <li id="nav-profile"><a href="">Личный кабинет</a></li>
              <li>
                <form>
                  <button id="nav-login" class="btn" formaction="./login.html">
                    Войти
                  </button>
                  <button
                    class="btn-accent"
                    id="nav-register"
                    formaction="./register.html"
                  >
                    Регистрация
                  </button>
                </form>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <main>
      <div class="container-center" id="register-form">
        <h1>Регистрация</h1>
        <form method="post">
          <div class="succ-alert">Форма успешно отправлена</div>
          <div>
            <input
              type="email"
              name="reg-email"
              id="reg-email"
              placeholder="Email"
              class="error-field"
              required
            />
            <p class="error-text">Не заполнение обязательных полей</p>
          </div>
          <div>
            <input
              type="text"
              name="reg-lastname"
              id="reg-lastname"
              placeholder="Фамилия"
              required
              class="error-field"
            />
            <p class="error-text">Некорректное заполнение данных</p>
          </div>
          <input
            type="text"
            name="reg-firstname"
            id="reg-firstname"
            placeholder="Имя"
            required
          />
          <input
            type="password"
            name="reg-password"
            id="reg-password"
            placeholder="Пароль"
            required
          />
          <input
            type="password"
            name="reg-password-confirm"
            id="reg-password-confirm"
            placeholder="Повторить пароль"
            required
          />
          <input
            type="date"
            name="reg-birthdate"
            id="reg-birthdate"
          />
          <input
            type="tel"
            name="reg-phone"
            id="reg-phone"
            placeholder="Телефон"
          />
          <div>
            <input type="checkbox" name="reg-consent" id="reg-consent" />
            <label for="reg-consent">
              <a href="#">Согласен на обработку персональных данных</a>
            </label>
          </div>
          <button class="btn-accent" id="reg-submit">Зарегистрироваться</button>
        </form>
      </div>
    </main>
  </body>
</html>
